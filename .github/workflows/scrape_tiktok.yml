name: TikTok UGC Scraper

on:
  repository_dispatch:
    types: [scrape_tiktok]   # n8n sends: { "event_type": "scrape_tiktok", "client_payload": { "query": "product name", "run_id": "abc123" } }

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yt-dlp

      - name: Scrape TikTok video
        id: scrape
        env:
          QUERY: ${{ github.event.client_payload.query }}
        run: |
          python scrape.py "$QUERY"
          # scrape.py writes video.mp4 + meta.json to ./output/

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-${{ github.run_id }}
          path: output/
          retention-days: 1   # keep artifacts for 1 day only

      # Write run_id to a file so n8n can easily retrieve the artifact
      - name: Echo run ID
        run: echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
        id: run_id_step
