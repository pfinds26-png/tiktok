name: TikTok UGC Scraper

on:
  repository_dispatch:
    types: [scrape_tiktok]

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yt-dlp

      - name: Scrape TikTok video
        id: scrape
        env:
          QUERY: ${{ github.event.client_payload.query }}
        run: |
          python scrape.py "$QUERY"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-${{ github.run_id }}
          path: output/
          retention-days: 1
